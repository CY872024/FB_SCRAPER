<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Scraper SaaS 控制台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --surface: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6; --primary-hover: #2563eb;
            --text: #f8fafc; --text-muted: #94a3b8;
            --danger: #ef4444; --success: #22c55e;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg);
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text); margin: 0; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center; margin-bottom: 30px; font-weight: 800; letter-spacing: 1px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .card {
            background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
        input[type="text"], input[type="password"], input[type="email"], input[type="time"] {
            width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border);
            color: var(--text); padding: 12px; border-radius: 8px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 100%; background: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .btn-sm { padding: 8px 12px; font-size: 14px; width: auto; }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }
        .btn-success { background: var(--success); }
        .hidden { display: none !important; }
        .loader {
            border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary);
            border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite;
            display: inline-block; vertical-align: middle;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .status-msg { margin-top: 15px; text-align: center; font-size: 14px; }
        .task-item {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 15px; position: relative;
        }
        .task-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px;}
        .task-header h3 { margin: 0; color: #60a5fa; }
        .badge { background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        .days-checkboxes label { display: inline-block; margin-right: 10px; font-weight: 400; color: var(--text); }
        textarea {
            width: 100%; background: rgba(15,23,42,0.6); border: 1px solid var(--border); color: var(--text);
            padding: 10px; border-radius: 8px; resize: vertical; min-height: 60px; font-family: inherit;
        }
        .page-entry { display: flex; gap: 10px; margin-bottom: 10px; }
        .page-entry input { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 FB Scraper SaaS</h1>

    <!-- 登入與註冊區塊 -->
    <div id="auth-section" class="card">
        <h2 style="margin-top:0; text-align:center;">會員登入 / 註冊</h2>
        <div class="form-group">
            <label>電子郵件</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>密碼</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="handleLogin()">登入</button>
            <button class="btn-success" onclick="handleRegister()">註冊新帳號</button>
        </div>
        
        <div style="text-align: center; margin: 20px 0; position: relative;">
            <hr style="border:none; border-top: 1px solid var(--border);">
            <span style="background: var(--surface); padding: 0 10px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 14px; color: var(--text-muted);">或使用社群帳號</span>
        </div>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button style="background: #ffffff; color: #757575; font-weight: 500;" onclick="handleGoogleLogin()">
                <svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align: middle; margin-right: 5px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                Google 登入
            </button>
            <button style="background: #1877F2; color: white; font-weight: 500;" onclick="handleFbLogin()">
                <svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align: middle; margin-right: 5px;"><path fill="currentColor" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
            </button>
        </div>
        <div id="auth-status" class="status-msg"></div>
    </div>

    <!-- 儀表板區塊 -->
    <div id="dashboard-section" class="hidden">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <span style="color:var(--text-muted); font-size:14px;">目前登入：</span>
                <strong id="user-email"></strong>
            </div>
            <button class="btn-sm btn-danger" onclick="handleLogout()">登出</button>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h2 style="margin:0;">我的排程任務</h2>
            <button class="btn-sm btn-success" onclick="addNewTaskUI()">+ 新增任務</button>
        </div>

        <div id="task-list">
            <div style="text-align: center;"><span class="loader"></span> 載入中...</div>
        </div>
        
        <button onclick="saveAllTasksToFirestore()" style="margin-top: 20px; font-size:18px;">💾 儲存所有變更</button>
        <div id="save-status" class="status-msg"></div>
    </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    // 填入使用者提供的 Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBqe1PbhiP2IGXqt7uD8mxCw5LXthtj7Yk",
        authDomain: "fb-event-notifier.firebaseapp.com",
        projectId: "fb-event-notifier",
        storageBucket: "fb-event-notifier.firebasestorage.app",
        messagingSenderId: "436849030228",
        appId: "1:436849030228:web:b1ba859f288adfa034a9c1",
        measurementId: "G-RLX0S6F7XM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentTasks = [];

    const DAYS = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];

    // Auth Listener
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
            loadUserData();
        } else {
            currentUser = null;
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
        }
    });

    window.handleLogin = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const status = document.getElementById('auth-status');
        try {
            status.innerHTML = '<span class="loader"></span> 登入中...';
            status.style.color = '#3b82f6';
            await signInWithEmailAndPassword(auth, email, password);
        } catch (e) {
            status.innerText = '登入失敗：' + e.message;
            status.style.color = '#ef4444';
        }
    };

    window.handleRegister = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const status = document.getElementById('auth-status');
        try {
            status.innerHTML = '<span class="loader"></span> 註冊中...';
            status.style.color = '#3b82f6';
            await createUserWithEmailAndPassword(auth, email, password);
        } catch (e) {
            status.innerText = '註冊失敗：' + e.message;
            status.style.color = '#ef4444';
        }
    };

    window.handleGoogleLogin = async () => {
        const provider = new GoogleAuthProvider();
        const status = document.getElementById('auth-status');
        try {
            status.innerHTML = '<span class="loader"></span> 轉跳中...';
            status.style.color = '#3b82f6';
            await signInWithPopup(auth, provider);
        } catch (e) {
            status.innerText = 'Google 登入失敗：' + e.message;
            status.style.color = '#ef4444';
        }
    };

    window.handleFbLogin = async () => {
        const provider = new FacebookAuthProvider();
        const status = document.getElementById('auth-status');
        try {
            status.innerHTML = '<span class="loader"></span> 轉跳中...';
            status.style.color = '#3b82f6';
            await signInWithPopup(auth, provider);
        } catch (e) {
            status.innerText = 'FB 登入失敗：' + e.message;
            status.style.color = '#ef4444';
        }
    };

    window.handleLogout = () => signOut(auth);

    async function loadUserData() {
        const listDiv = document.getElementById('task-list');
        try {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) {
                currentTasks = docSnap.data().tasks || [];
            } else {
                currentTasks = [];
            }
            renderTasks();
        } catch (e) {
            listDiv.innerHTML = `<div style="color:#ef4444;text-align:center;">載入失敗：${e.message}</div>`;
        }
    }

    function renderTasks() {
        const listDiv = document.getElementById('task-list');
        listDiv.innerHTML = '';
        if (currentTasks.length === 0) {
            listDiv.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding:20px;">尚無任務，請點擊右上角新增任務。</div>';
            return;
        }

        currentTasks.forEach((task, index) => {
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task-item';
            
            let daysHtml = '';
            for (let i = 0; i < 7; i++) {
                const checked = (task.schedule?.days_of_week || []).includes(i) ? 'checked' : '';
                daysHtml += `<label><input type="checkbox" class="task-days-${index}" value="${i}" ${checked}> ${DAYS[i]}</label>`;
            }

            let pagesHtml = '';
            (task.pages || []).forEach(p => {
                pagesHtml += `<div class="page-entry"><input type="text" class="p-name" placeholder="粉專名稱" value="${p.name}"><input type="text" class="p-url" placeholder="粉專網址" value="${p.url}"></div>`;
            });

            taskDiv.innerHTML = `
                <div class="task-header">
                    <h3><input type="text" id="t-name-${index}" value="${task.task_name || '未命名任務'}" style="background:transparent; border:none; color:#60a5fa; font-size:18px; font-weight:bold; padding:0; outline:none; border-bottom:1px dashed #60a5fa;"></h3>
                    <button class="btn-sm btn-danger" onclick="removeTask(${index})">刪除任務</button>
                </div>
                
                <div class="form-group">
                    <label>執行星期</label>
                    <div class="days-checkboxes">${daysHtml}</div>
                </div>
                
                <div class="form-group">
                    <label>執行時間 (HH:MM)</label>
                    <input type="time" id="t-time-${index}" value="${task.schedule?.time || '12:00'}">
                </div>

                <div class="form-group">
                    <label>收件人 (多筆請用逗號分隔)</label>
                    <input type="text" id="t-recipients-${index}" value="${(task.recipients || []).join(', ')}" placeholder="email1@test.com, email2@test.com">
                </div>

                <div class="form-group">
                    <label>監控關鍵字 (多筆請用逗號分隔)</label>
                    <textarea id="t-keywords-${index}" placeholder="報名, 活動, 免費參加...">${(task.keywords || []).join(', ')}</textarea>
                </div>

                <div class="form-group">
                    <label>監控粉專列表</label>
                    <div id="pages-container-${index}">${pagesHtml}</div>
                    <button class="btn-sm" style="background:rgba(255,255,255,0.1); margin-top:10px;" onclick="addPageInput(${index})">+ 新增一個粉專</button>
                </div>
            `;
            listDiv.appendChild(taskDiv);
        });
    }

    window.addNewTaskUI = () => {
        currentTasks.push({
            task_name: "新任務",
            schedule: { days_of_week: [0,1,2,3,4,5,6], time: "09:00" },
            recipients: [currentUser.email],
            keywords: ["報名", "活動"],
            pages: [{ name: "", url: "" }]
        });
        renderTasks();
    };

    window.removeTask = (index) => {
        if(confirm('確定要刪除這個任務嗎？')) {
            currentTasks.splice(index, 1);
            renderTasks();
        }
    };

    window.addPageInput = (index) => {
        const container = document.getElementById(`pages-container-${index}`);
        const div = document.createElement('div');
        div.className = 'page-entry';
        div.innerHTML = `<input type="text" class="p-name" placeholder="粉專名稱"><input type="text" class="p-url" placeholder="粉專網址">`;
        container.appendChild(div);
    };

    window.saveAllTasksToFirestore = async () => {
        const status = document.getElementById('save-status');
        
        // 從 UI 收集所有資料
        const newTasks = [];
        for (let i = 0; i < currentTasks.length; i++) {
            if(!document.getElementById(`t-name-${i}`)) continue; // 可能被刪除但尚未 re-render

            const name = document.getElementById(`t-name-${i}`).value.trim();
            const time = document.getElementById(`t-time-${i}`).value;
            
            const daysNode = document.querySelectorAll(`.task-days-${i}:checked`);
            const days_of_week = Array.from(daysNode).map(cb => parseInt(cb.value));

            const recptRaw = document.getElementById(`t-recipients-${i}`).value;
            const recipients = recptRaw.split(',').map(s => s.trim()).filter(s => s);

            const kwRaw = document.getElementById(`t-keywords-${i}`).value;
            const keywords = kwRaw.split(',').map(s => s.trim()).filter(s => s);

            const pagesNode = document.getElementById(`pages-container-${i}`).querySelectorAll('.page-entry');
            const pages = [];
            pagesNode.forEach(pNode => {
                const pName = pNode.querySelector('.p-name').value.trim();
                const pUrl = pNode.querySelector('.p-url').value.trim();
                if (pName && pUrl) pages.push({ name: pName, url: pUrl });
            });

            newTasks.push({
                task_name: name,
                schedule: { days_of_week, time },
                recipients, keywords, pages
            });
        }

        try {
            status.innerHTML = '<span class="loader"></span> 儲存中...';
            status.style.color = '#3b82f6';
            
            await setDoc(doc(db, "users", currentUser.uid), { tasks: newTasks }, { merge: true });
            
            currentTasks = newTasks; // 更新記憶體狀態
            renderTasks(); // 重新渲染清理空白粉專框
            
            status.style.color = '#22c55e';
            status.innerText = '✅ 所有設定已成功儲存！雲端爬蟲將在設定時間自動為您抓取。';
            setTimeout(() => { status.innerText = ''; }, 4000);
        } catch (e) {
            status.style.color = '#ef4444';
            status.innerText = '儲存失敗：' + e.message;
        }
    };
</script>

</body>
</html>
