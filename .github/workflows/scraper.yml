name: FB Scraper Scheduler

on:
  schedule:
    - cron: '0 * * * *' # 每天每小時的 0 分執行 (UTC 時間)
  workflow_dispatch:
    inputs:
      run_all:
        description: '強制立即執行所有任務 (忽略排程時間)'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: 🚀 執行爬蟲任務 (依據排程)
        if: ${{ !inputs.run_all }}
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONIOENCODING: utf-8
        run: |
          python fb_scraper.py --github-cron

      - name: ⚡ 執行爬蟲任務 (強制手動全部執行)
        if: ${{ inputs.run_all }}
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONIOENCODING: utf-8
        run: |
          python fb_scraper.py --test

      - name: 💾 儲存最新執行狀態並上傳
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.json || true
          # 如果沒有變更就不會 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update last_run.json [skip ci]" && git push)
