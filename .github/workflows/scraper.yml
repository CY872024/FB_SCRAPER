name: FB Scraper SaaS Engine

on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分鐘執行一次
  workflow_dispatch:
    inputs:
      run_all:
        description: '強制立即執行所有任務 (忽略排程時間)'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 下載程式碼
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          pip install playwright firebase-admin
          playwright install chromium

      - name: 🚀 執行爬蟲任務 (依據資料庫排程)
        if: ${{ !inputs.run_all }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          PYTHONIOENCODING: utf-8
        run: |
          python fb_scraper.py --github-cron

      - name: ⚡ 執行爬蟲任務 (強制手動全部執行)
        if: ${{ inputs.run_all }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          PYTHONIOENCODING: utf-8
        run: |
          python fb_scraper.py --test
